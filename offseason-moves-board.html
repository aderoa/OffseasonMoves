<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f1216">
<title>Offseason Moves Board — HoopsMatic</title>
<style>
  /* ============================================================
     Offseason Moves Board — an internal ledger tool for building
     the Presto copy-paste. Identity: a front-office "transaction
     ledger" — monospaced data, ink-on-slate, amber section rules
     matching the Draft Workouts board it sits beside.
     ============================================================ */
  :root{
    --bg:#0f1216; --panel:#171c22; --panel2:#1e242c; --line:#2a323c; --line2:#3a4350;
    --txt:#e8edf2; --muted:#94a1b0; --faint:#5f6b78;
    --amber:#b45309; --amber-lite:#f5a524; --blue:#1a4d8f; --blue-lite:#4d8df6;
    --green:#2f9e6b; --red:#d8584f; --purple:#8b6fc0;
    --uc:#4d8df6; --po:#f5a524; --to:#d8584f; --rfa:#2f9e6b; --ufa:#94a1b0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1200px;margin:0 auto;padding:1.1rem 1.2rem 4rem}

  header{display:flex;align-items:baseline;gap:.7rem;flex-wrap:wrap;padding:.4rem 0 1rem;border-bottom:1px solid var(--line);margin-bottom:1.1rem}
  header h1{font-size:1.3rem;margin:0;font-weight:700;letter-spacing:-.01em}
  header h1 .ic{color:var(--amber-lite)}
  header .sub{color:var(--muted);font-size:.8rem}
  header .build{margin-left:auto;font-family:ui-monospace,'JetBrains Mono',monospace;font-size:.6rem;color:var(--faint);border:1px solid var(--line);padding:.12rem .4rem;border-radius:4px}

  .toolbar{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:1.1rem}
  .btn{font:inherit;font-size:.8rem;font-weight:600;border-radius:8px;border:1px solid var(--line2);
    background:var(--panel2);color:var(--txt);padding:.5rem .85rem;cursor:pointer;transition:.15s;display:inline-flex;gap:.4rem;align-items:center}
  .btn:hover{border-color:var(--blue-lite);background:rgba(77,141,246,.1)}
  .btn.primary{background:var(--amber);border-color:var(--amber);color:#fff}
  .btn.primary:hover{filter:brightness(1.1)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .search{flex:1;min-width:160px;font:inherit;font-size:.82rem;background:var(--panel);border:1px solid var(--line);
    border-radius:8px;padding:.5rem .7rem;color:var(--txt)}
  .search::placeholder{color:var(--faint)}

  .legend{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1rem;font-size:.66rem;color:var(--muted)}
  .legend .k{display:inline-flex;align-items:center;gap:.3rem}
  .legend .dot{width:9px;height:9px;border-radius:2px;display:inline-block}

  .loading,.error{text-align:center;padding:3rem 1rem;color:var(--muted)}
  .error{color:var(--red)}
  .spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--amber-lite);
    border-radius:50%;animation:spin .8s linear infinite;margin:0 auto .8rem}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* team blocks */
  .team{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:.8rem;overflow:hidden}
  .team-hd{display:flex;align-items:center;gap:.6rem;padding:.6rem .9rem;cursor:pointer;user-select:none}
  .team-hd:hover{background:var(--panel2)}
  .team-hd .nm{font-size:1rem;font-weight:700;letter-spacing:-.01em}
  .team-hd .counts{margin-left:auto;display:flex;gap:.5rem;font-family:ui-monospace,monospace;font-size:.62rem}
  .team-hd .counts .c{display:inline-flex;align-items:center;gap:.25rem;color:var(--muted)}
  .team-hd .counts .c b{color:var(--txt);font-weight:700}
  .team-hd .chev{color:var(--faint);transition:transform .15s;font-size:.7rem}
  .team.collapsed .chev{transform:rotate(-90deg)}
  .team.collapsed .team-bd{display:none}
  .team-bd{padding:.4rem .9rem 1rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.9rem}

  .bucket h4{margin:.5rem 0 .4rem;font-size:.66rem;text-transform:uppercase;letter-spacing:.08em;
    display:flex;align-items:center;gap:.35rem;padding-bottom:.25rem;border-bottom:1px solid var(--line)}
  .bucket h4 .dot{width:8px;height:8px;border-radius:2px}
  .bucket h4 .n{margin-left:auto;color:var(--faint);font-family:ui-monospace,monospace;font-weight:600}
  .bucket ul{list-style:none;margin:0;padding:0}
  .bucket li{font-size:.74rem;padding:.16rem 0;display:flex;gap:.4rem;align-items:baseline;border-bottom:1px solid rgba(255,255,255,.03)}
  .bucket li:last-child{border-bottom:none}
  .bucket li .pn{color:var(--txt)}
  .bucket li .meta{margin-left:auto;color:var(--faint);font-family:ui-monospace,monospace;font-size:.62rem;flex-shrink:0}
  .bucket .empty{font-size:.66rem;color:var(--faint);font-style:italic;padding:.2rem 0}

  /* modal for Presto export */
  .scrim{position:fixed;inset:0;background:rgba(8,10,13,.75);z-index:100;display:none;align-items:center;justify-content:center;padding:1rem}
  .scrim.on{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line2);border-radius:12px;max-width:820px;width:100%;max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
  .modal-hd{display:flex;align-items:center;gap:.6rem;padding:.85rem 1rem;border-bottom:1px solid var(--line)}
  .modal-hd h3{margin:0;font-size:.95rem}
  .modal-hd .x{margin-left:auto;background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;line-height:1}
  .modal-bd{padding:1rem;overflow:auto}
  .modal-bd textarea{width:100%;height:340px;font-family:ui-monospace,'JetBrains Mono',monospace;font-size:.68rem;
    background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:.7rem;resize:vertical;line-height:1.45}
  .modal-ft{display:flex;gap:.5rem;justify-content:flex-end;padding:.8rem 1rem;border-top:1px solid var(--line)}
  .hint{font-size:.7rem;color:var(--muted);margin:.1rem 0 .7rem}

  .toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);background:var(--panel2);
    border:1px solid var(--line2);border-radius:8px;padding:.55rem 1rem;font-size:.78rem;z-index:200;
    box-shadow:0 8px 24px rgba(0,0,0,.45);opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  @media(max-width:600px){ .team-hd .counts{display:none} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="ic">📋</span> Offseason Moves Board</h1>
    <span class="sub">Contract status by team · 2026-27</span>
    <span class="build" id="build">build —</span>
  </header>

  <div class="toolbar">
    <input type="text" class="search" id="search" placeholder="Filter teams or players…">
    <button class="btn" id="expandBtn" onclick="toggleAll()">Collapse all</button>
    <button class="btn primary" id="prestoBtn" onclick="openPresto()">⧉ Generate Presto HTML</button>
  </div>

  <div class="legend" id="legend"></div>

  <div id="content">
    <div class="loading"><div class="spinner"></div><p>Loading contracts…</p></div>
  </div>
</div>

<div class="scrim" id="scrim">
  <div class="modal">
    <div class="modal-hd"><h3>Presto HTML — Offseason Moves</h3><button class="x" onclick="closePresto()">×</button></div>
    <div class="modal-bd">
      <p class="hint">Copy this and paste into Presto (HTML source), same as the Draft Workouts board. Empty buckets are omitted.</p>
      <textarea id="prestoOut" readonly></textarea>
    </div>
    <div class="modal-ft">
      <button class="btn" onclick="closePresto()">Close</button>
      <button class="btn primary" onclick="copyPresto()">Copy to clipboard</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BUILD = 'moves-board v0.1';
const API_BASE = (location.hostname.includes('github.io') || location.protocol==='file:')
  ? 'https://hoopsmatic.com' : '';
document.getElementById('build').textContent = BUILD;
console.log('%c📋 '+BUILD, 'color:#f5a524;font-weight:bold');

// Bucket definitions (order + labels + colors). This is the baseline set; the
// "change" buckets (Added / Re-signed / Extended / Left) come in the next pass.
const BUCKETS = [
  { key:'under_contract', label:'Under Contract', color:'var(--uc)' },
  { key:'player_option',  label:'Player Option',  color:'var(--po)' },
  { key:'team_option',    label:'Team Option',    color:'var(--to)' },
  { key:'rfa',            label:'Restricted FAs', color:'var(--rfa)' },
  { key:'ufa',            label:'Unrestricted FAs', color:'var(--ufa)' },
];
// Presto export labels (full words, matching the editorial tone of the workouts board)
const PRESTO_LABEL = {
  under_contract:'Under Contract', player_option:'Player Options', team_option:'Team Options',
  rfa:'Restricted Free Agents', ufa:'Unrestricted Free Agents'
};

let TEAMS = {};        // teamName -> { bucketKey: [players] }
let teamOrder = [];
let allCollapsed = false;

// ---------- CSV parse ----------
function parseCSV(text){
  const rows=[]; let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++} else q=false } else cur+=c }
    else { if(c==='"')q=true; else if(c===','){row.push(cur);cur=''}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur=''}
      else if(c==='\r'){} else cur+=c }
  }
  if(cur||row.length){row.push(cur);rows.push(row)}
  return rows;
}
function num(v){ const n=parseInt(String(v||'').replace(/[^0-9-]/g,'')); return isNaN(n)?0:n; }

// ---------- load + bucket ----------
async function load(){
  try{
    const resp = await fetch(`${API_BASE}/api/contracts`);
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const rows = parseCSV(await resp.text());
    if(rows.length<2) throw new Error('no rows');
    buildTeams(rows);
    render();
  }catch(e){
    document.getElementById('content').innerHTML =
      `<div class="error"><p>Couldn't load contracts. ${e.message}</p>
       <button class="btn" onclick="load()" style="margin-top:.6rem">Retry</button></div>`;
    console.error('[moves]', e);
  }
}

function buildTeams(rows){
  // column map (verified against contracts sheet): 0 name, 2 team, 10 = 2026-27 salary,
  // 26 OPTION, 27 END, 38 YOS
  TEAMS = {};
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; if(!r) continue;
    const name=(r[0]||'').trim(); if(!name) continue;
    const team=(r[2]||'').trim(); if(!team) continue;
    const opt=(r[26]||'').trim().toUpperCase();
    const sal=num(r[10]);
    const yos=num(r[38]);
    let bucket;
    if(opt.includes('PLAYER')) bucket='player_option';
    else if(opt.includes('TEAM')) bucket='team_option';
    else if(sal>0) bucket='under_contract';
    else bucket = (yos>0 && yos<=3) ? 'rfa' : 'ufa';
    if(!TEAMS[team]){ TEAMS[team]={}; BUCKETS.forEach(b=>TEAMS[team][b.key]=[]); }
    TEAMS[team][bucket].push({ name, sal, yos });
  }
  // sort each bucket by salary desc then name; team order alphabetical
  Object.values(TEAMS).forEach(t=>BUCKETS.forEach(b=>
    t[b.key].sort((a,z)=> z.sal-a.sal || a.name.localeCompare(z.name))));
  teamOrder = Object.keys(TEAMS).sort();
}

// ---------- render ----------
function fmtMeta(p){
  const parts=[];
  if(p.sal>0) parts.push('$'+(p.sal/1e6).toFixed(1)+'M');
  if(p.yos>0) parts.push(p.yos+'y');
  return parts.join(' · ');
}
function render(){
  // legend
  document.getElementById('legend').innerHTML = BUCKETS.map(b=>
    `<span class="k"><span class="dot" style="background:${b.color}"></span>${b.label}</span>`).join('');

  const filter = (document.getElementById('search').value||'').toLowerCase().trim();
  const el = document.getElementById('content');
  const blocks=[];
  for(const team of teamOrder){
    const t=TEAMS[team];
    // filter: match team name OR any player
    let show=true;
    if(filter){
      const teamMatch = team.toLowerCase().includes(filter);
      const playerMatch = BUCKETS.some(b=>t[b.key].some(p=>p.name.toLowerCase().includes(filter)));
      show = teamMatch || playerMatch;
    }
    if(!show) continue;
    const counts = BUCKETS.map(b=>`<span class="c"><span class="dot" style="width:7px;height:7px;border-radius:2px;background:${b.color}"></span><b>${t[b.key].length}</b></span>`).join('');
    const cols = BUCKETS.map(b=>{
      const players=t[b.key];
      const items = players.length
        ? players.map(p=>`<li><span class="pn">${esc(p.name)}</span><span class="meta">${fmtMeta(p)}</span></li>`).join('')
        : `<div class="empty">—</div>`;
      return `<div class="bucket">
        <h4><span class="dot" style="background:${b.color}"></span>${b.label}<span class="n">${players.length}</span></h4>
        <ul>${items}</ul></div>`;
    }).join('');
    blocks.push(`<div class="team${allCollapsed?' collapsed':''}">
      <div class="team-hd" onclick="this.parentNode.classList.toggle('collapsed')">
        <span class="nm">${esc(team)}</span>
        <span class="counts">${counts}</span>
        <span class="chev">▼</span>
      </div>
      <div class="team-bd">${cols}</div>
    </div>`);
  }
  el.innerHTML = blocks.length ? blocks.join('') : `<div class="loading">No teams or players match "${esc(filter)}".</div>`;
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function toggleAll(){
  allCollapsed=!allCollapsed;
  document.getElementById('expandBtn').textContent = allCollapsed?'Expand all':'Collapse all';
  render();
}

// ---------- Presto export (matches Draft Workouts HTML structure) ----------
function buildPrestoHTML(){
  const L=[];
  L.push('<div class="omb-wrap" style="font-family:sans-serif;max-width:700px;margin:0 auto">');
  L.push('  <p style="margin:0 0 1em">Where every team stands heading into the 2026-27 offseason — each roster sorted by contract status. We\u2019ll update this board with every move as free agency unfolds.</p>');
  for(const team of teamOrder){
    const t=TEAMS[team];
    const total = BUCKETS.reduce((s,b)=>s+t[b.key].length,0);
    if(!total) continue;
    L.push(`  <h3 style="margin:1.2em 0 .3em;font-size:1.1em;border-bottom:2px solid #b45309;padding-bottom:.15em">${esc(team)}</h3>`);
    for(const b of BUCKETS){
      const players=t[b.key];
      if(!players.length) continue;
      L.push(`  <h4 style="margin:.6em 0 .2em;font-size:.95em;color:#b45309">${PRESTO_LABEL[b.key]} <span style="color:#999;font-weight:normal">(${players.length})</span></h4>`);
      L.push('  <ul style="list-style:none;margin:.2em 0 .6em 0;padding:0">');
      for(const p of players){
        const meta = fmtMeta(p);
        const metaSpan = meta ? ` <span style="color:#666;font-size:.9em">(${meta})</span>` : '';
        L.push(`    <li style="margin:.12em 0">${esc(p.name)}${metaSpan}</li>`);
      }
      L.push('  </ul>');
    }
  }
  L.push('</div>');
  return L.join('\n');
}
function openPresto(){
  document.getElementById('prestoOut').value = buildPrestoHTML();
  document.getElementById('scrim').classList.add('on');
}
function closePresto(){ document.getElementById('scrim').classList.remove('on'); }
function copyPresto(){
  const ta=document.getElementById('prestoOut'); ta.select();
  navigator.clipboard.writeText(ta.value).then(()=>toast('Copied Presto HTML'),()=>{document.execCommand('copy');toast('Copied');});
}

let _tt;
function toast(m){ const e=document.getElementById('toast'); e.textContent=m; e.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>e.classList.remove('show'),2200); }

document.getElementById('search').addEventListener('input', render);
document.getElementById('scrim').addEventListener('click', e=>{ if(e.target.id==='scrim') closePresto(); });
load();
</script>
</body>
</html>
