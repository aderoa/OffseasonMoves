<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f1216">
<title>Offseason Moves Board — HoopsMatic</title>
<style>
  /* ============================================================
     Offseason Moves Board — an internal ledger tool for building
     the Presto copy-paste. Identity: a front-office "transaction
     ledger" — monospaced data, ink-on-slate, amber section rules
     matching the Draft Workouts board it sits beside.
     ============================================================ */
  :root{
    --bg:#0f1216; --panel:#171c22; --panel2:#1e242c; --line:#2a323c; --line2:#3a4350;
    --txt:#e8edf2; --muted:#94a1b0; --faint:#5f6b78;
    --amber:#b45309; --amber-lite:#f5a524; --blue:#1a4d8f; --blue-lite:#4d8df6;
    --green:#2f9e6b; --red:#d8584f; --purple:#8b6fc0;
    --uc:#4d8df6; --po:#f5a524; --to:#d8584f; --rfa:#2f9e6b; --ufa:#94a1b0;
    --added:#3fb97f; --resigned:#5db4e6; --extended:#b89be0; --left:#e07a6f; --drafted:#e0b341;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1200px;margin:0 auto;padding:1.1rem 1.2rem 4rem}

  header{display:flex;align-items:baseline;gap:.7rem;flex-wrap:wrap;padding:.4rem 0 1rem;border-bottom:1px solid var(--line);margin-bottom:1.1rem}
  header h1{font-size:1.3rem;margin:0;font-weight:700;letter-spacing:-.01em}
  header h1 .ic{color:var(--amber-lite)}
  header .sub{color:var(--muted);font-size:.8rem}
  header .build{margin-left:auto;font-family:ui-monospace,'JetBrains Mono',monospace;font-size:.6rem;color:var(--faint);border:1px solid var(--line);padding:.12rem .4rem;border-radius:4px}

  .toolbar{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:1.1rem}
  .btn{font:inherit;font-size:.8rem;font-weight:600;border-radius:8px;border:1px solid var(--line2);
    background:var(--panel2);color:var(--txt);padding:.5rem .85rem;cursor:pointer;transition:.15s;display:inline-flex;gap:.4rem;align-items:center}
  .btn:hover{border-color:var(--blue-lite);background:rgba(77,141,246,.1)}
  .btn.primary{background:var(--amber);border-color:var(--amber);color:#fff}
  .btn.primary:hover{filter:brightness(1.1)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .search{flex:1;min-width:160px;font:inherit;font-size:.82rem;background:var(--panel);border:1px solid var(--line);
    border-radius:8px;padding:.5rem .7rem;color:var(--txt)}
  .search::placeholder{color:var(--faint)}

  .legend{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1rem;font-size:.66rem;color:var(--muted)}
  .legend .k{display:inline-flex;align-items:center;gap:.3rem}
  .legend .dot{width:9px;height:9px;border-radius:2px;display:inline-block}

  .loading,.error{text-align:center;padding:3rem 1rem;color:var(--muted)}
  .error{color:var(--red)}
  .spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--amber-lite);
    border-radius:50%;animation:spin .8s linear infinite;margin:0 auto .8rem}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* team blocks */
  .team{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:.8rem;overflow:hidden}
  .team-hd{display:flex;align-items:center;gap:.6rem;padding:.6rem .9rem;cursor:pointer;user-select:none}
  .team-hd:hover{background:var(--panel2)}
  .team-hd .nm{font-size:1rem;font-weight:700;letter-spacing:-.01em}
  .team-hd .counts{margin-left:auto;display:flex;gap:.5rem;font-family:ui-monospace,monospace;font-size:.62rem}
  .team-hd .counts .c{display:inline-flex;align-items:center;gap:.25rem;color:var(--muted)}
  .team-hd .counts .c b{color:var(--txt);font-weight:700}
  .team-hd .chev{color:var(--faint);transition:transform .15s;font-size:.7rem}
  .team.collapsed .chev{transform:rotate(-90deg)}
  .team.collapsed .team-bd{display:none}
  .team-bd{padding:.4rem .9rem 1rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.9rem}

  .bucket h4{margin:.5rem 0 .4rem;font-size:.66rem;text-transform:uppercase;letter-spacing:.08em;
    display:flex;align-items:center;gap:.35rem;padding-bottom:.25rem;border-bottom:1px solid var(--line)}
  .bucket h4 .dot{width:8px;height:8px;border-radius:2px}
  .bucket h4 .n{margin-left:auto;color:var(--faint);font-family:ui-monospace,monospace;font-weight:600}
  .bucket ul{list-style:none;margin:0;padding:0}
  .bucket li{font-size:.74rem;padding:.16rem 0;display:flex;gap:.4rem;align-items:baseline;border-bottom:1px solid rgba(255,255,255,.03)}
  .bucket li:last-child{border-bottom:none}
  .bucket li .pn{color:var(--txt)}
  .bucket li .meta{margin-left:auto;color:var(--faint);font-family:ui-monospace,monospace;font-size:.62rem;flex-shrink:0}
  .bucket .empty{font-size:.66rem;color:var(--faint);font-style:italic;padding:.2rem 0}
  .bucket li .li-act{margin-left:.35rem;flex-shrink:0;background:none;border:1px solid var(--line);
    color:var(--faint);border-radius:5px;font-size:.62rem;line-height:1;padding:.12rem .3rem;cursor:pointer;opacity:0;transition:.12s}
  .bucket li:hover .li-act{opacity:1}
  .bucket li .li-act:hover{border-color:var(--blue-lite);color:var(--blue-lite)}
  .bucket li .li-act.undo:hover{border-color:var(--red);color:var(--red)}
  .bucket li .note{font-size:.6rem;color:var(--amber-lite);font-style:italic;margin-left:.1rem;flex-shrink:1;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bucket[data-bucket="added"] h4 .dot{background:var(--added)}
  .add-mini{background:none;border:1px solid var(--line2);color:var(--muted);border-radius:6px;
    font:inherit;font-size:.6rem;font-weight:600;padding:.18rem .45rem;cursor:pointer;margin-left:.4rem;flex-shrink:0;transition:.12s}
  .add-mini:hover{border-color:var(--added);color:var(--added)}
  .team-hd .counts{margin-left:auto}

  .toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);background:var(--panel2);
    border:1px solid var(--line2);border-radius:8px;padding:.55rem 1rem;font-size:.78rem;z-index:200;
    box-shadow:0 8px 24px rgba(0,0,0,.45);opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  @media(max-width:600px){ .team-hd .counts{display:none} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="ic">📋</span> Offseason Moves Board</h1>
    <span class="sub">Contract status by team · 2026-27</span>
    <span class="build" id="build">build —</span>
  </header>

  <div class="toolbar">
    <input type="text" class="search" id="search" placeholder="Filter teams or players…">
    <button class="btn" id="refreshBtn" title="Force-reload the latest data now, bypassing all caches" onclick="refreshData(this)">⟳ Refresh</button>
    <button class="btn" id="expandBtn" onclick="toggleAll()">Collapse all</button>
    <button class="btn primary" id="prestoBtn" onclick="copyPresto()">⧉ Copy Presto HTML</button>
    <button class="btn" title="Back up your logged moves to a file" onclick="exportMoves()">↧ Export</button>
    <button class="btn" title="Restore logged moves from a file" onclick="importMoves()">↥ Import</button>
  </div>

  <div class="legend" id="legend"></div>

  <div id="content">
    <div class="loading"><div class="spinner"></div><p>Loading contracts…</p></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BUILD = 'moves-board v1.6';
const API_BASE = (location.hostname.includes('github.io') || location.protocol==='file:')
  ? 'https://hoopsmatic.com' : '';
document.getElementById('build').textContent = BUILD;
console.log('%c📋 '+BUILD, 'color:#f5a524;font-weight:bold');

// Bucket definitions (order + labels + colors). This is the baseline set; the
// "change" buckets (Added / Re-signed / Extended / Left) come in the next pass.
// Baseline (auto-derived) buckets, shown first.
const BASE_BUCKETS = [
  { key:'under_contract', label:'Under Contract', color:'var(--uc)' },
  { key:'player_option',  label:'Player Option',  color:'var(--po)' },
  { key:'team_option',    label:'Team Option',    color:'var(--to)' },
  { key:'rfa',            label:'Restricted FAs', color:'var(--rfa)' },
  { key:'ufa',            label:'Unrestricted FAs', color:'var(--ufa)' },
];
// Change buckets (logged moves), shown after the baseline.
const CHANGE_BUCKETS = [
  { key:'added',     label:'Added',     color:'var(--added)' },
  { key:'resigned',  label:'Re-signed', color:'var(--resigned)' },
  { key:'extended',  label:'Extended',  color:'var(--extended)' },
  { key:'drafted',   label:'Drafted',   color:'var(--drafted)' },
  { key:'left',      label:'Left',      color:'var(--left)' },
];
const BUCKETS = BASE_BUCKETS.concat(CHANGE_BUCKETS); // for legend/counts
const BASE_KEYS = BASE_BUCKETS.map(b=>b.key);
const CHANGE_KEYS = CHANGE_BUCKETS.map(b=>b.key);
// Presto export labels (full words)
const PRESTO_LABEL = {
  under_contract:'Under Contract', player_option:'Player Options', team_option:'Team Options',
  rfa:'Restricted Free Agents', ufa:'Unrestricted Free Agents',
  added:'Added', resigned:'Re-signed', extended:'Extended', drafted:'Drafted', left:'Left'
};

// Full official team names, keyed by the short name used in the contracts data.
const TEAM_NAMES = {
  'Atlanta':'Atlanta Hawks', 'Boston':'Boston Celtics', 'Brooklyn':'Brooklyn Nets',
  'Charlotte':'Charlotte Hornets', 'Chicago':'Chicago Bulls', 'Cleveland':'Cleveland Cavaliers',
  'Dallas':'Dallas Mavericks', 'Denver':'Denver Nuggets', 'Detroit':'Detroit Pistons',
  'Golden State':'Golden State Warriors', 'Houston':'Houston Rockets', 'Indiana':'Indiana Pacers',
  'LA Clippers':'Los Angeles Clippers', 'LA Lakers':'Los Angeles Lakers', 'Memphis':'Memphis Grizzlies',
  'Miami':'Miami Heat', 'Milwaukee':'Milwaukee Bucks', 'Minnesota':'Minnesota Timberwolves',
  'New Orleans':'New Orleans Pelicans', 'New York':'New York Knicks', 'Oklahoma City':'Oklahoma City Thunder',
  'Orlando':'Orlando Magic', 'Philadelphia':'Philadelphia 76ers', 'Phoenix':'Phoenix Suns',
  'Portland':'Portland Trail Blazers', 'Sacramento':'Sacramento Kings', 'San Antonio':'San Antonio Spurs',
  'Toronto':'Toronto Raptors', 'Utah':'Utah Jazz', 'Washington':'Washington Wizards'
};
function fullTeam(t){ return TEAM_NAMES[t] || t; }
// Draft TEAM column uses abbreviations; the board keys on short names.
const ABBR_TO_KEY = {
  ATL:'Atlanta', BOS:'Boston', BKN:'Brooklyn', BRK:'Brooklyn', CHA:'Charlotte', CHO:'Charlotte',
  CHI:'Chicago', CLE:'Cleveland', DAL:'Dallas', DEN:'Denver', DET:'Detroit',
  GSW:'Golden State', GS:'Golden State', HOU:'Houston', IND:'Indiana',
  LAC:'LA Clippers', LAL:'LA Lakers', MEM:'Memphis', MIA:'Miami', MIL:'Milwaukee',
  MIN:'Minnesota', NOP:'New Orleans', NO:'New Orleans', NYK:'New York', NY:'New York',
  OKC:'Oklahoma City', ORL:'Orlando', PHI:'Philadelphia', PHX:'Phoenix', PHO:'Phoenix',
  POR:'Portland', SAC:'Sacramento', SAS:'San Antonio', SA:'San Antonio', TOR:'Toronto',
  UTA:'Utah', UTAH:'Utah', WAS:'Washington', WSH:'Washington'
};
let DRAFTPICKS = {};   // teamKey -> [ {name, pick} ]  (auto first-round picks)

let TEAMS = {};        // teamName -> { bucketKey: [players] } (BASELINE, from data)
let teamOrder = [];
let allCollapsed = false;

// ---------- MOVES (logged changes, persisted to localStorage) ----------
// A move reclassifies a player into a change bucket. Two kinds:
//   - reclassify: an existing baseline player moved to a change bucket (keyed by team|name)
//   - manual:     a player not in the data (Drafted rookie, incoming Added FA) — has own team
// Shape: { id, team, name, bucket, note, manual:bool }
const MOVES_KEY = 'omb_moves_v1';
let MOVES = [];
function loadMoves(){
  try{ MOVES = JSON.parse(localStorage.getItem(MOVES_KEY) || '[]'); }
  catch(e){ MOVES = []; }
  if(!Array.isArray(MOVES)) MOVES = [];
}
function saveMoves(){
  try{ localStorage.setItem(MOVES_KEY, JSON.stringify(MOVES)); }catch(e){}
}
function moveKey(team,name){ return team+'|'+name; }
// is there a reclassify move for this baseline player?
function moveFor(team,name){ return MOVES.find(m=>!m.manual && m.team===team && m.name===name); }
function genId(){ return 'm'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ---------- CSV parse ----------
function parseCSV(text){
  const rows=[]; let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++} else q=false } else cur+=c }
    else { if(c==='"')q=true; else if(c===','){row.push(cur);cur=''}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur=''}
      else if(c==='\r'){} else cur+=c }
  }
  if(cur||row.length){row.push(cur);rows.push(row)}
  return rows;
}
function num(v){ const n=parseInt(String(v||'').replace(/[^0-9-]/g,'')); return isNaN(n)?0:n; }

// ---------- load + bucket ----------
// Pull the first-round draft picks (DRAFTEE column, cols: 15=pick, 16=team, 17=draftee)
// and bucket each under its owning team's "Drafted" category. Same live tab the
// Depth Charts read; never throws (board still works if the draft feed is down).
async function loadDraftPicks(force){
  DRAFTPICKS = {};
  try{
    const resp = await fetch(`${API_BASE}/api/draft-csv` + (force?'?nocache':''));
    if(!resp.ok) return;
    const rows = parseCSV(await resp.text());
    for(let i=1;i<rows.length;i++){
      const r = rows[i];
      const pick = parseInt((r[15]||'').trim());
      if(!(pick>=1 && pick<=60)) continue;              // both rounds (1-60)
      const name = (r[17]||'').trim();
      if(!name) continue;                               // pick not made yet
      const key = ABBR_TO_KEY[(r[16]||'').trim().toUpperCase()];
      if(!key) continue;
      (DRAFTPICKS[key] = DRAFTPICKS[key] || []).push({ name, pick });
    }
  }catch(_){}
}

async function load(force){
  try{
    // Immovable baseline first: the frozen end-of-2025-26 snapshot (baseline.json,
    // committed alongside this page). Falls back to live derivation only if the
    // snapshot isn't present yet, so the board never breaks during setup.
    // `force` (Refresh button) busts the GitHub CDN cache on baseline.json and the
    // Worker edge cache on /api/contracts so we pull the very latest immediately.
    let usedSnapshot=false;
    try{
      const bResp = await fetch('baseline.json' + (force?('?t='+Date.now()):''), {cache:'no-store'});
      if(bResp.ok){ const data = await bResp.json(); if(data && data.teams){ applyBaseline(data); usedSnapshot=true; console.log('[moves] baseline: frozen snapshot ('+(data.count||'?')+' players, '+(data.season||'')+')'); } }
    }catch(_){}
    if(!usedSnapshot){
      console.warn('[moves] baseline.json not found — using LIVE derivation (not frozen). Commit baseline.json to freeze.');
      const resp = await fetch(`${API_BASE}/api/contracts` + (force?'?nocache':''));
      if(!resp.ok) throw new Error('HTTP '+resp.status);
      const rows = parseCSV(await resp.text());
      if(rows.length<2) throw new Error('no rows');
      buildTeams(rows);
    }
    await loadDraftPicks(force);
    loadMoves();
    render();
  }catch(e){
    document.getElementById('content').innerHTML =
      `<div class="error"><p>Couldn't load rosters. ${e.message}</p>
       <button class="btn" onclick="load()" style="margin-top:.6rem">Retry</button></div>`;
    console.error('[moves]', e);
  }
}

// Refresh button: force a fresh data pull (bypassing edge + CDN caches) and re-render,
// without a full page reload. Re-reads the frozen baseline; in live-fallback mode this
// forces fresh contracts straight from Google Sheets via the Worker's ?nocache path.
async function refreshData(btn){
  const orig = btn ? btn.innerHTML : '';
  if(btn){ btn.disabled=true; btn.innerHTML='⟳ Refreshing…'; }
  try{ await load(true); toast('Data refreshed'); }
  catch(e){ toast('Refresh failed'); }
  finally{ if(btn){ btn.disabled=false; btn.innerHTML=orig; } }
}

// Load the frozen baseline snapshot into TEAMS (already bucketed at end of 2025-26).
// This is the immovable reference — moves are tracked against it.
function applyBaseline(data){
  TEAMS = {};
  const teams = data.teams || {};
  for(const team in teams){
    TEAMS[team] = {};
    BUCKETS.forEach(b=> TEAMS[team][b.key] = Array.isArray(teams[team][b.key]) ? teams[team][b.key].slice() : []);
    BUCKETS.forEach(b=> TEAMS[team][b.key].sort((a,z)=> z.sal-a.sal || a.name.localeCompare(z.name)));
  }
  teamOrder = Object.keys(TEAMS).sort((a,b)=> fullTeam(a).localeCompare(fullTeam(b)));
}

function buildTeams(rows){
  // column map (verified against contracts sheet): 0 name, 2 team, 10 = 2026-27 salary,
  // 26 OPTION, 27 END, 38 YOS
  TEAMS = {};
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; if(!r) continue;
    const name=(r[0]||'').trim(); if(!name) continue;
    const team=(r[2]||'').trim(); if(!team) continue;
    const opt=(r[26]||'').trim().toUpperCase();
    const sal=num(r[10]);          // 2026-27 salary
    const yos=num(r[38]);
    const end=(r[27]||'').trim();  // contract end year
    let bucket;
    if(sal>0){
      // Under contract for 2026-27. The option only matters for THIS board when the
      // option year IS 2026-27 (contract ends 2027). A later-year option (e.g. a PO
      // in 2028-29) still means the player is under contract for 2026-27.
      if(end==='2027' && opt.includes('PLAYER')) bucket='player_option';
      else if(end==='2027' && opt.includes('TEAM')) bucket='team_option';
      else bucket='under_contract';
    } else {
      bucket = (yos>=0 && yos<=3) ? 'rfa' : 'ufa';
    }
    if(!TEAMS[team]){ TEAMS[team]={}; BUCKETS.forEach(b=>TEAMS[team][b.key]=[]); }
    TEAMS[team][bucket].push({ name, sal, yos });
  }
  // sort each bucket by salary desc then name; team order alphabetical
  Object.values(TEAMS).forEach(t=>BUCKETS.forEach(b=>
    t[b.key].sort((a,z)=> z.sal-a.sal || a.name.localeCompare(z.name))));
  teamOrder = Object.keys(TEAMS).sort((a,b)=>fullTeam(a).localeCompare(fullTeam(b)));
}

// ---------- render ----------
function fmtMeta(p){
  return p.sal>0 ? '$'+(p.sal/1e6).toFixed(1)+'M' : '';
}
// Build the effective (post-moves) bucket map for a team: baseline minus reclassified
// players, plus reclassified + manual players in their change buckets.
function effectiveBuckets(team){
  const out={}; BUCKETS.forEach(b=>out[b.key]=[]);
  // baseline players, unless reclassified by a move
  for(const k of BASE_KEYS){
    for(const p of (TEAMS[team] ? TEAMS[team][k] : [])){
      const mv = moveFor(team, p.name);
      if(mv){
        if(mv.bucket==='exercised'){
          // option picked up → Under Contract (keep the 2026-27 salary)
          out['under_contract'].push({ ...p, note:mv.note, moveId:mv.id, from:k });
        } else if(mv.bucket==='declined'){
          // option turned down → Free Agent. RFA if ≤3 years of service, else UFA
          // (same CBA/YOS rule the baseline uses); no 2026-27 salary as a free agent.
          const faKey = (p.yos>=0 && p.yos<=3) ? 'rfa' : 'ufa';
          out[faKey].push({ ...p, sal:0, note:mv.note, moveId:mv.id, from:k });
        } else {
          out[mv.bucket].push({ ...p, note:mv.note, moveId:mv.id, from:k });
        }
      } else out[k].push(p);
    }
  }
  // manual entries (Drafted / incoming Added) for this team
  for(const m of MOVES){
    if(m.manual && m.team===team) out[m.bucket].push({ name:m.name, sal:0, note:m.note, moveId:m.id, manual:true, extra:m.extra });
  }
  // auto first-round draft picks (not user moves; de-duped against logged drafted)
  if(DRAFTPICKS[team] && DRAFTPICKS[team].length){
    const seenD = new Set(out['drafted'].map(p=>p.name));
    for(const dp of DRAFTPICKS[team]){
      if(seenD.has(dp.name)) continue; seenD.add(dp.name);
      out['drafted'].push({ name:dp.name, sal:0, pick:dp.pick, note:'#'+dp.pick, auto:true });
    }
  }
  // keep every bucket in salary order so merged-in players land in the right spot
  Object.keys(out).forEach(k=> out[k].sort((a,z)=> (z.sal||0)-(a.sal||0) || a.name.localeCompare(z.name)));
  if(out['drafted'].length) out['drafted'].sort((a,z)=> (a.pick||999)-(z.pick||999) || a.name.localeCompare(z.name));
  return out;
}

function render(){
  document.getElementById('legend').innerHTML = BUCKETS.map(b=>
    `<span class="k"><span class="dot" style="background:${b.color}"></span>${b.label}</span>`).join('');

  const filter = (document.getElementById('search').value||'').toLowerCase().trim();
  const el = document.getElementById('content');
  const blocks=[];
  for(const team of teamOrder){
    const t = effectiveBuckets(team);
    let show=true;
    if(filter){
      const teamMatch = fullTeam(team).toLowerCase().includes(filter) || team.toLowerCase().includes(filter);
      const playerMatch = BUCKETS.some(b=>t[b.key].some(p=>p.name.toLowerCase().includes(filter)));
      show = teamMatch || playerMatch;
    }
    if(!show) continue;
    // counts: only show non-empty change buckets in the header to keep it clean
    const counts = BUCKETS.filter(b=>BASE_KEYS.includes(b.key)||t[b.key].length)
      .map(b=>`<span class="c"><span class="dot" style="width:7px;height:7px;border-radius:2px;background:${b.color}"></span><b>${t[b.key].length}</b></span>`).join('');
    const cols = BUCKETS.map(b=>{
      const players=t[b.key];
      // hide empty change buckets entirely; always show the 5 baseline buckets
      if(!players.length && CHANGE_KEYS.includes(b.key)) return '';
      const items = players.length
        ? players.map(p=>liFor(team,b.key,p)).join('')
        : `<div class="empty">—</div>`;
      return `<div class="bucket" data-bucket="${b.key}">
        <h4><span class="dot" style="background:${b.color}"></span>${b.label}<span class="n">${players.length}</span></h4>
        <ul>${items}</ul></div>`;
    }).join('');
    blocks.push(`<div class="team${allCollapsed?' collapsed':''}">
      <div class="team-hd" onclick="if(!event.target.closest('.add-mini'))this.parentNode.classList.toggle('collapsed')">
        <span class="nm">${esc(fullTeam(team))}</span>
        <span class="counts">${counts}</span>
        <button class="add-mini" title="Add a Drafted or incoming player" onclick="event.stopPropagation();addManual('${jsArg(team)}')">+ Add</button>
        <span class="chev">▼</span>
      </div>
      <div class="team-bd">${cols}</div>
    </div>`);
  }
  el.innerHTML = blocks.length ? blocks.join('') : `<div class="loading">No teams or players match "${esc(filter)}".</div>`;
}

// One player line. Baseline players get a "move" action; logged players show their
// note + an undo. Manual players show an edit/remove.
function liFor(team, bucketKey, p){
  const meta = fmtMeta(p);
  const isChange = CHANGE_KEYS.includes(bucketKey);
  const noteTag = p.note ? `<span class="note">${esc(p.note)}</span>` : '';
  let action;
  if(isChange){
    action = p.moveId
      ? `<button class="li-act edit" title="Edit note" onclick="editNote('${p.moveId}')">\u270e</button>`
        + `<button class="li-act undo" title="Undo this move" onclick="undoMove('${p.moveId}')">↩</button>`
      : '';  // auto-injected (e.g. first-round draft pick) — managed from the sheet
  } else {
    action = `<button class="li-act" title="Log a move for ${esc(p.name)}" onclick="logMove('${jsArg(team)}','${jsArg(p.name)}')">⋯</button>`;
  }
  return `<li><span class="pn">${esc(p.name)}</span>${noteTag}<span class="meta">${meta}</span>${action}</li>`;
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
// Escape a value for a single-quoted JS string inside an HTML attribute (onclick="fn('…')").
// Without this, apostrophe names like D'Angelo Russell terminate the string and the click silently fails.
function jsArg(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ----- logging moves -----
const CHANGE_PROMPT = 'added=Added (trade/FA/draft-signed)\nresigned=Re-signed\nextended=Extended\nleft=Left (trade out / signed elsewhere / overseas)';

function pickBucket(promptLabel, dflt, isOption, hasMove){
  let opts = isOption ? ['exercised','declined','added','resigned','extended','left']
                      : ['added','resigned','extended','left'];
  if(hasMove) opts = opts.concat('clear');
  const head = isOption
    ? '\n\nexercised = option picked up (→ Under Contract)\ndeclined = option turned down (→ Free Agent, RFA/UFA per CBA)\n\nType one of: ' + opts.join(', ')
    : '\n\nType one of: ' + opts.join(', ');
  const ans = prompt(promptLabel + head + (dflt?` (default ${dflt})`:''), dflt||'');
  if(ans===null) return null;
  const k = ans.trim().toLowerCase();
  if(!k && dflt) return dflt;
  if(opts.includes(k)) return k;
  alert('Unrecognized category. Use: ' + opts.join(', ') + '.');
  return null;
}

// Which baseline bucket a player came from (player_option / team_option / etc.).
function baselineBucketOf(team, name){
  if(!TEAMS[team]) return null;
  for(const k of BASE_KEYS){ if((TEAMS[team][k]||[]).some(p=>p.name===name)) return k; }
  return null;
}

// Resolve a user-typed team to a known team key (key, full name, or unique partial).
function resolveTeam(input){
  const q=(input||'').trim().toLowerCase(); if(!q) return null;
  for(const t of teamOrder){ if(t.toLowerCase()===q) return t; }
  for(const t of teamOrder){ if(fullTeam(t).toLowerCase()===q) return t; }
  const hits=teamOrder.filter(t=>fullTeam(t).toLowerCase().includes(q));
  return hits.length===1 ? hits[0] : null;
}
// Create the matching side of a trade on another team (reclassify if that player
// is on its baseline, else a manual entry). De-dupes; links via pairId.
function addPaired(team, name, bucket, note, pairId){
  if(MOVES.some(m=>m.team===team && m.name===name && m.bucket===bucket)) return;
  const isBaseline=!!baselineBucketOf(team,name);
  const ex=isBaseline?moveFor(team,name):null;
  if(ex){ ex.bucket=bucket; ex.note=note; ex.pairId=pairId; }
  else MOVES.push({ id:genId(), team, name, bucket, note, manual:!isBaseline, pairId });
}
// After logging a Left/Added, optionally mirror it on the other team (trade/signing).
function maybePair(srcMove, name, team, bucket){
  if(bucket!=='left' && bucket!=='added') return;
  const other = bucket==='left' ? 'added' : 'left';
  const otherLabel = other==='added' ? 'Added' : 'Left';
  const dirWord = bucket==='left' ? 'go TO' : 'come FROM';
  const ans = prompt(`Did ${name} ${dirWord} another team (trade / signing)?\n\nType that team (name or abbreviation) to add the matching "${otherLabel}" entry there.\nLeave blank if not (free agency, waived, overseas).`, '');
  if(ans===null || !ans.trim()) return;
  const dest = resolveTeam(ans.trim());
  if(!dest){ alert('Team not recognized or ambiguous: "'+ans.trim()+'". Skipped the paired entry \u2014 add it manually if needed.'); return; }
  if(dest===team) return;
  const pid = 'p'+genId();
  if(srcMove) srcMove.pairId = pid;
  const noteTxt = bucket==='left' ? ('from '+fullTeam(team)) : ('to '+fullTeam(team));
  addPaired(dest, name, other, noteTxt, pid);
  toast(`${name} also \u2192 ${fullTeam(dest)} (${otherLabel})`);
}

// Reclassify an existing baseline player into a change bucket.
function logMove(team, name){
  const existing = moveFor(team, name);
  const from = baselineBucketOf(team, name);
  const isOption = from==='player_option' || from==='team_option';
  const bucket = pickBucket(`Log a move for ${name} (${fullTeam(team)})`, existing?existing.bucket:'', isOption, !!existing);
  if(!bucket) return;
  if(bucket==='clear'){
    if(existing){
      const ids = existing.pairId ? MOVES.filter(x=>x.pairId===existing.pairId).map(x=>x.id) : [existing.id];
      MOVES = MOVES.filter(m=>!ids.includes(m.id));
      saveMoves(); render(); toast(`${name} → cleared`);
    }
    return;
  }
  const note = prompt('Optional note (e.g. "traded to Miami", "signed overseas — Olympiacos"). Leave blank for none:', existing?existing.note||'':'');
  if(note===null) return;
  let src;
  if(existing){ existing.bucket=bucket; existing.note=note.trim(); src=existing; }
  else { src={ id:genId(), team, name, bucket, note:note.trim(), manual:false }; MOVES.push(src); }
  maybePair(src, name, team, bucket);
  saveMoves(); render();
  const outLabel = bucket==='exercised' ? 'Under Contract' : bucket==='declined' ? 'Free Agents' : PRESTO_LABEL[bucket];
  toast(`${name} → ${outLabel}`);
}

// Add a player not in the data: Drafted rookie, or an incoming Added player.
function addManual(team){
  const name = prompt(`Add a player to ${fullTeam(team)} (not yet in the database).\n\nUse this for drafted rookies or incoming signings/trades.\n\nPlayer name:`, '');
  if(name===null || !name.trim()) return;
  const bucket = (function(){
    const ans = prompt('Category for '+name.trim()+':\n\nType: drafted, added, resigned, extended, or left\n(default: drafted)', 'drafted');
    if(ans===null) return null;
    const k=ans.trim().toLowerCase()||'drafted';
    if(['drafted','added','resigned','extended','left'].includes(k)) return k;
    alert('Unrecognized category.'); return null;
  })();
  if(!bucket) return;
  const note = prompt('Optional note (e.g. pick number, "from trade with PHX", "two-way"). Leave blank for none:', '');
  if(note===null) return;
  const src={ id:genId(), team, name:name.trim(), bucket, note:note.trim(), manual:true };
  MOVES.push(src);
  maybePair(src, name.trim(), team, bucket);
  saveMoves(); render();
  toast(`${name.trim()} added → ${PRESTO_LABEL[bucket]}`);
}

function editNote(moveId){
  const m = MOVES.find(x=>x.id===moveId); if(!m) return;
  const note = prompt(`Note for ${m.name} (${PRESTO_LABEL[m.bucket]||m.bucket}):`, m.note||'');
  if(note===null) return;
  m.note = note.trim(); saveMoves(); render();
  toast(`Note updated \u2014 ${m.name}`);
}
function undoMove(id){
  const m = MOVES.find(x=>x.id===id); if(!m) return;
  const ids = m.pairId ? MOVES.filter(x=>x.pairId===m.pairId).map(x=>x.id) : [m.id];
  MOVES = MOVES.filter(x=>!ids.includes(x.id));
  saveMoves(); render();
  toast(`Reverted ${m.name}`);
}

// ----- export / import (backup of the move set) -----
function exportMoves(){
  const blob = new Blob([JSON.stringify(MOVES,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='offseason-moves-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Moves exported');
}
function importMoves(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json,.json';
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=()=>{ try{
      const arr=JSON.parse(rd.result);
      if(!Array.isArray(arr)) throw new Error('not a moves file');
      if(MOVES.length && !confirm(`Replace your current ${MOVES.length} logged move(s) with ${arr.length} from the file?`)) return;
      MOVES=arr; saveMoves(); render(); toast(`Imported ${arr.length} move(s)`);
    }catch(e){ alert('Could not import: '+e.message); } };
    rd.readAsText(f);
  };
  inp.click();
}

function toggleAll(){
  allCollapsed=!allCollapsed;
  document.getElementById('expandBtn').textContent = allCollapsed?'Expand all':'Collapse all';
  render();
}

// ---------- Presto export (matches Draft Workouts HTML structure) ----------
function buildPrestoHTML(){
  // Presto export only: Added, then Re-signed, then Extended, then everything else.
  // (On-screen board order is unchanged — this reorders the copy-paste output.)
  const PRESTO_BUCKETS = [
    ...BUCKETS.filter(b => b.key === 'added'),
    ...BUCKETS.filter(b => b.key === 'drafted'),
    ...BUCKETS.filter(b => b.key === 'resigned'),
    ...BUCKETS.filter(b => b.key === 'extended'),
    ...BUCKETS.filter(b => !['added','drafted','resigned','extended'].includes(b.key)),
  ];
  const L=[];
  L.push('<div class="omb-wrap" style="font-family:sans-serif;max-width:760px;margin:0 auto">');
  L.push('  <p style="margin:0 0 1em">Where every team stands heading into the 2026-27 offseason — each roster sorted by contract status. We\u2019ll update this board with every move as free agency unfolds.</p>');
  for(const team of teamOrder){
    const t=effectiveBuckets(team);
    const total = BUCKETS.reduce((s,b)=>s+t[b.key].length,0);
    if(!total) continue;
    L.push(`  <h3 style="margin:1.2em 0 .3em;font-size:1.1em;border-bottom:2px solid #b45309;padding-bottom:.15em">${esc(fullTeam(team))}</h3>`);
    L.push('  <table style="width:100%;border-collapse:collapse;margin:0 0 1.1em;font-size:.95em">');
    for(const b of PRESTO_BUCKETS){
      const players=t[b.key];
      if(!players.length) continue; // omit empty buckets (incl. unused change buckets)
      // right column: one player per line. Each player is a block-level <div> (not a
      // <br>-separated run) because Presto strips <br> inside table cells, collapsing
      // everyone onto one line. note (e.g. "signed overseas") for change buckets,
      // salary for baseline buckets.
      const lines = players.map(p=>{
        const meta = fmtMeta(p);
        const detail = p.note ? p.note : (meta || '');
        const detailSpan = detail ? ` <span style="color:#666;font-size:.9em">(${esc(detail)})</span>` : '';
        return `<div style="margin:0">${esc(p.name)}${detailSpan}</div>`;
      }).join('');
      // left column = bucket header; right column = players
      L.push('    <tr>');
      L.push(`      <td style="vertical-align:top;white-space:nowrap;padding:.5em .9em .5em 0;border-top:1px solid #eee;color:#b45309;font-weight:bold">${PRESTO_LABEL[b.key]} <span style="color:#999;font-weight:normal">(${players.length})</span></td>`);
      L.push(`      <td style="vertical-align:top;padding:.5em 0;border-top:1px solid #eee;line-height:1.65">${lines}</td>`);
      L.push('    </tr>');
    }
    L.push('  </table>');
  }
  L.push('</div>');
  return L.join('\n');
}
function copyPresto(){
  const html = buildPrestoHTML();
  const done = ()=>toast('Presto HTML copied — ready to paste');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(html).then(done, ()=>fallbackCopy(html));
  } else fallbackCopy(html);
}
function fallbackCopy(text){
  const ta=document.createElement('textarea'); ta.value=text;
  ta.style.position='fixed'; ta.style.left='-9999px'; document.body.appendChild(ta);
  ta.select(); try{document.execCommand('copy');toast('Presto HTML copied');}catch(e){toast('Copy failed');}
  document.body.removeChild(ta);
}

let _tt;
function toast(m){ const e=document.getElementById('toast'); e.textContent=m; e.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>e.classList.remove('show'),2200); }

document.getElementById('search').addEventListener('input', render);
load();
</script>
